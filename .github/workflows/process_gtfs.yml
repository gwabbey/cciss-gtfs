name: CCISS NeTEx to GTFS

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache OSM Data
        uses: actions/cache@v4
        with:
          path: transit.osm.pbf
          key: osm-data-${{ hashFiles('transit.osm.pbf') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzip-dev libboost-all-dev libexpat1-dev zlib1g-dev zip
          pip install -r requirements.txt

      - name: Build Pfaedle
        run: |
          git clone https://github.com/ad-freiburg/pfaedle.git
          mkdir -p pfaedle/build && cd pfaedle/build
          cmake .. && make -j$(nproc)
          sudo make install

      - name: Run Processing Scripts
        run: |
          chmod +x download-gtfs.sh
          ./download-gtfs.sh gtfs.json .
          python3 convert-netex.py --json netex.json --out .

      - name: Run Pfaedle Map Matching
        run: |
          pfaedle -x transit.osm.pbf atv.gtfs.zip -D
          cd gtfs_out && zip -r ../atv.gtfs.zip .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true