name: CCISS NeTEx to GTFS

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache OSM Data
        uses: actions/cache@v4
        with:
          path: transit.osm.pbf
          key: osm-data-${{ hashFiles('transit.osm.pbf') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libzip-dev libboost-all-dev libexpat1-dev zlib1g-dev zip
          pip install -r requirements.txt

      - name: Cache Pfaedle Binary
        id: cache-pfaedle
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/pfaedle
          key: pfaedle-bin-v1

      - name: Build Pfaedle if not cached
        if: steps.cache-pfaedle.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ad-freiburg/pfaedle.git
          mkdir -p pfaedle/build && cd pfaedle/build
          cmake .. && make -j$(nproc)
          sudo make install

      - name: Run Processing Scripts
        run: |
          chmod +x download-gtfs.sh
          ./download-gtfs.sh gtfs.json .
          python3 convert-netex.py --json netex.json --out .

      - name: Run Pfaedle Map Matching
        run: |
          pfaedle -x transit.osm.pbf atv.gtfs.zip -D
          cd gtfs-out && zip -r ../atv.gtfs.zip .

      - name: Upload Files to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest *.gtfs.zip --repo ${{ github.repository }} --clobber